name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            build_tool: cargo
            archive_name: x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            build_tool: cross
            archive_name: aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            build_tool: cargo
            archive_name: x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            build_tool: cargo
            archive_name: aarch64-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.build_tool == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5

      - name: Build
        env:
          BUILD_TOOL: ${{ matrix.build_tool }}
          TARGET: ${{ matrix.target }}
        run: |
          "${BUILD_TOOL}" build --release --target "${TARGET}"

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          REF_NAME: ${{ github.ref_name }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
        run: |
          mkdir -p staging
          cp "target/${TARGET}/release/janus" staging/
          if [[ "${TARGET}" == *"apple"* ]]; then
            cp entitlements.plist staging/
          fi
          cd staging
          tar czf "../janus-${REF_NAME}-${ARCHIVE_NAME}.tar.gz" *
          cd ..

      - name: Generate checksum
        env:
          REF_NAME: ${{ github.ref_name }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          ARCHIVE="janus-${REF_NAME}-${ARCHIVE_NAME}.tar.gz"
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: janus-${{ matrix.archive_name }}
          path: |
            janus-${{ github.ref_name }}-${{ matrix.archive_name }}.tar.gz
            janus-${{ github.ref_name }}-${{ matrix.archive_name }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd artifacts
          cat janus-*.sha256 > checksums.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          cd artifacts
          gh release create "${REF_NAME}" \
            --repo "${REPO}" \
            --title "${REF_NAME}" \
            --generate-notes \
            *.tar.gz checksums.sha256
