name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/janus staging/
          if [[ "${{ matrix.target }}" == *"apple"* ]]; then
            cp entitlements.plist staging/
          fi
          cd staging
          tar czf ../janus-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          cd ..

      - name: Generate checksum
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            shasum -a 256 janus-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > janus-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          else
            sha256sum janus-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > janus-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: janus-${{ matrix.target }}
          path: |
            janus-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            janus-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums file
        run: |
          cd artifacts
          cat *.sha256 > checksums.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            *.tar.gz checksums.sha256
